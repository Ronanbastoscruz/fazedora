<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fazedora</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    width: 280px;
    background: #0f0f13;
    color: #e0e0e0;
    padding: 16px;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 1px solid #1e1e2a;
  }

  .logo {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, #6C63FF, #48bfe3);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .header h1 { font-size: 15px; font-weight: 700; color: #fff; }
  .header p  { font-size: 11px; color: #666; }

  .status-box {
    background: #1a1a25;
    border: 1px solid #252535;
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 14px;
    font-size: 11px;
    color: #888;
    min-height: 36px;
    line-height: 1.5;
  }

  .status-box.running { border-color: #6C63FF55; color: #a89cff; }
  .status-box.success { border-color: #22c55e55; color: #4ade80; }
  .status-box.error   { border-color: #ef444455; color: #f87171; }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: #44445a;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .btn-grid {
    display: flex;
    flex-direction: column;
    gap: 7px;
    margin-bottom: 12px;
  }

  button {
    width: 100%;
    padding: 9px 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.15s ease;
    position: relative;
    overflow: hidden;
  }

  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-all {
    background: linear-gradient(135deg, #6C63FF, #48bfe3);
    color: #fff;
    font-weight: 700;
    font-size: 13px;
    justify-content: center;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 14px;
  }
  .btn-all:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 20px #6C63FF44; }

  .btn-phase {
    background: #1a1a25;
    border: 1px solid #252535;
    color: #ccc;
  }
  .btn-phase:hover:not(:disabled) { background: #22223a; border-color: #6C63FF55; color: #fff; }

  .badge {
    background: #252540;
    color: #6C63FF;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    min-width: 20px;
    text-align: center;
  }

  .divider { border: none; border-top: 1px solid #1e1e2a; margin: 12px 0; }

  /* Estilos para o Toggle */
  .toggle-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #1a1a25;
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 14px;
    border: 1px solid #252535;
  }
  .toggle-container span { font-size: 12px; font-weight: 500; color: #aaa; }

  .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
    background-color: #2a2a3a; transition: .4s; border-radius: 34px;
  }
  .slider:before {
    position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px;
    background-color: white; transition: .4s; border-radius: 50%;
  }
  input:checked + .slider { background-color: #6C63FF; }
  input:focus + .slider { box-shadow: 0 0 1px #6C63FF; }
  input:checked + .slider:before { transform: translateX(22px); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">⚡</div>
  <div>
    <h1>Fazedora</h1>
    <p>Automação Trello → ChatGPT → Site</p>
  </div>
</div>

<div class="toggle-container">
  <span>Status da Automação</span>
  <label class="switch">
    <input type="checkbox" id="toggle-active">
    <span class="slider round"></span>
  </label>
</div>

<div class="status-box" id="status">Pronto para iniciar.</div>

<button class="btn-all" id="btn-all">▶ Executar Tudo</button>

<div class="section-label">Testar por Fase</div>

<div class="btn-grid">
  <button class="btn-phase" id="btn-fase1">
    <span class="badge">1</span> Trello → Coletar Dados
  </button>
  <button class="btn-phase" id="btn-fase2">
    <span class="badge">2</span> ChatGPT → Enviar e Processar
  </button>
  <button class="btn-phase" id="btn-fase3">
    <span class="badge">3</span> Site → Login e Editor
  </button>
</div>

<script src="popup.js"></script>
</body>
</html>
